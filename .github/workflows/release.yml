name: Release desktop app

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  detect-tauri:
    name: Detect Tauri application
    runs-on: ubuntu-latest
    outputs:
      configured: ${{ steps.detect.outputs.configured }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Check whether the desktop application is scaffolded
        id: detect
        shell: bash
        run: |
          if [[ -f src-tauri/Cargo.toml && -f src-tauri/tauri.conf.json ]]; then
            echo 'configured=true' >> "$GITHUB_OUTPUT"
          else
            echo 'configured=false' >> "$GITHUB_OUTPUT"

  release:
    name: Package and publish (${{ matrix.os }})
    needs: detect-tauri
    if: ${{ needs.detect-tauri.outputs.configured == 'true' }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Restore Rust build cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux desktop dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install --yes \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            wget

      - name: Publish unsigned release artifacts
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: Lattice ${{ github.ref_name }}
          releaseBody: See the assets below for this release.
          releaseDraft: true
          prerelease: ${{ contains(github.ref_name, '-') }}
